name: Build Release Draft

on:
  workflow_dispatch:
    inputs:
      prerelease:
        description: 'Mark as pre-release'
        type: boolean
        required: false
        default: false
      version:
        description: 'Version (e.g. 0.1.0; leave empty to auto-increment minor from latest release, e.g. 0.1.0 -> 0.2.0)'
        required: false

permissions:
  contents: write

jobs:

  version:
    runs-on: windows-latest
    outputs:
      v: ${{ steps.ver.outputs.v }}
      vl: ${{ steps.ver.outputs.vl }}
    steps:
      - name: Resolve version
        id: ver
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $input = "${{ github.event.inputs.version }}".Trim()
          if ([string]::IsNullOrEmpty($input)) {
            $latest = (gh api repos/${{ github.repository }}/releases/latest --jq '.tag_name' 2>$null)
            if ($LASTEXITCODE -eq 0 -and $latest -match '^(\d+)\.(\d+)\.(\d+)') {
              $input = "$($Matches[1]).$([int]$Matches[2] + 1).0"
              Write-Host "Version empty, auto-incremented from $latest to $input"
            } else {
              $input = "0.1.0"
              Write-Host "Version empty, no latest release found, fallback to 0.1.0"
            }
          }
          $v = $input.Replace(' ', '-')
          $vl = $v.ToLowerInvariant()
          "v=$v" >> $env:GITHUB_OUTPUT
          "vl=$vl" >> $env:GITHUB_OUTPUT


  build:
    needs: version
    strategy:
      matrix:
        platform: [x64, arm64]
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build launcher
        run: msbuild src/Starshot.Launcher/Starshot.Launcher.vcxproj -p:Configuration=Release -p:Platform=${{ matrix.platform }}

      - name: Publish main app
        run: dotnet publish src/Starshot/Starshot.csproj -c Release -p:Platform=${{ matrix.platform }} -r win-${{ matrix.platform }}

      - name: Trim unsupported locales
        run: |
          # 从 Starshot.Language 的 Lang.{locale}.resx 读程序支持的语言（Lang.resx 是默认 en，主 dll 内无目录）
          $supported = Get-ChildItem src/Starshot.Language/Lang.*.resx | ForEach-Object {
            if ($_.Name -match '^Lang\.([a-z]{2}(-[A-Za-z0-9]+)?)\.resx$') { $Matches[1] }
          }
          Write-Host "Supported locales: $($supported -join ', ')"
          Get-ChildItem build/release/app -Directory | Where-Object {
            if ($supported -contains $_.Name) { return $false }
            try { [void][System.Globalization.CultureInfo]::GetCultureInfo($_.Name); return $true } catch { return $false }
          } | Remove-Item -Recurse -Force

      - name: Version layout
        run: |
          Move-Item build/release/app "build/release/app-${{ needs.version.outputs.vl }}" -Force
          "version=${{ needs.version.outputs.v }}" | Set-Content -Path build/release/version.ini -Encoding UTF8

      - name: Zip release
        run: Compress-Archive -Path build/release/* -DestinationPath "Starshot-${{ needs.version.outputs.vl }}-win-${{ matrix.platform }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Starshot-${{ needs.version.outputs.vl }}-win-${{ matrix.platform }}
          path: Starshot-${{ needs.version.outputs.vl }}-win-${{ matrix.platform }}.zip


  release:
    needs: [version, build]
    runs-on: windows-latest
    steps:
      - name: Download x64
        uses: actions/download-artifact@v4
        with:
          name: Starshot-${{ needs.version.outputs.vl }}-win-x64
          path: x64
      - name: Download arm64
        uses: actions/download-artifact@v4
        with:
          name: Starshot-${{ needs.version.outputs.vl }}-win-arm64
          path: arm64

      - name: Create Draft Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.version.outputs.vl }}
          name: ${{ needs.version.outputs.v }}
          draft: true
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          files: |
            x64/Starshot-${{ needs.version.outputs.vl }}-win-x64.zip
            arm64/Starshot-${{ needs.version.outputs.vl }}-win-arm64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
