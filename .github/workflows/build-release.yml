name: Build Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build launcher
        run: msbuild src/Starshot.Launcher/Starshot.Launcher.vcxproj -p:Configuration=Release -p:Platform=x64

      - name: Publish main app
        run: dotnet publish src/Starshot/Starshot.csproj -c Release -p:Platform=x64

      - name: Zip release
        run: Compress-Archive -Path build/release/* -DestinationPath Starshot-${{ github.event.inputs.version }}-win-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Starshot-${{ github.event.inputs.version }}-win-x64
          path: Starshot-${{ github.event.inputs.version }}-win-x64.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Starshot ${{ github.event.inputs.version }}
          files: Starshot-${{ github.event.inputs.version }}-win-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
